services:
  - type: web
    name: emenu
    env: php
    plan: free
    buildCommand: "composer install --no-dev --optimize-autoloader && npm install && npm run build"
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: base64:NW3sfTt7U1ODNFd/aMoSr7mAHsBlBPNWy/lfheLtxIE=
